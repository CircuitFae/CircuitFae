name: README heartbeat

# Optional: keeps Actions tab active; README stats use live third-party URLs (no file churn).

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Stats refresh note
        run: |
          echo "Profile README pulls dynamic stats from github-readme-stats, streak-stats, and trophies."
          echo "No repository README commit is required for those widgets to update."
