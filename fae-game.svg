<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120" role="img" aria-label="CircuitFae pixel quest, fae on a starfield">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orbGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style type="text/css"><![CDATA[
      @keyframes twinkle {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 1; }
      }
      @keyframes orbPulse {
        0%, 100% { opacity: 0.65; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.25); }
      }
      .star { fill: #fcd34d; animation: twinkle 2.4s ease-in-out infinite; }
      .star:nth-child(odd) { animation-delay: 0.4s; }
      .star:nth-child(3n) { animation-delay: 0.9s; }
      .orb { fill: #b57bff; filter: url(#orbGlow); }
      .orb-wrap { transform-box: fill-box; transform-origin: center; }
      .orb-wrap.orb-a { animation: orbPulse 1.8s ease-in-out infinite; }
      .orb-wrap.orb-b { animation: orbPulse 2.1s ease-in-out 0.3s infinite; }
      .orb-wrap.orb-c { animation: orbPulse 1.5s ease-in-out 0.6s infinite; }
    ]]></style>
  </defs>
  <rect width="600" height="120" fill="url(#sky)"/>
  <!-- starfield -->
  <g opacity="0.9">
    <circle class="star" cx="40" cy="22" r="1.2"/>
    <circle class="star" cx="120" cy="14" r="1"/>
    <circle class="star" cx="200" cy="28" r="1.1"/>
    <circle class="star" cx="280" cy="18" r="0.9"/>
    <circle class="star" cx="360" cy="32" r="1.2"/>
    <circle class="star" cx="440" cy="12" r="1"/>
    <circle class="star" cx="520" cy="26" r="1.1"/>
    <circle class="star" cx="90" cy="40" r="0.8"/>
    <circle class="star" cx="310" cy="8" r="0.85"/>
    <circle class="star" cx="570" cy="38" r="1"/>
    <circle class="star" cx="160" cy="10" r="0.7"/>
    <circle class="star" cx="480" cy="44" r="0.75"/>
  </g>
  <!-- ground grid hint -->
  <rect x="0" y="98" width="600" height="22" fill="#0a0a24" opacity="0.85"/>
  <line x1="0" y1="98" x2="600" y2="98" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1"/>
  <!-- collectible orbs (commits) -->
  <g transform="translate(180,72)">
    <g class="orb-wrap orb-a"><circle class="orb" cx="0" cy="0" r="4"/></g>
  </g>
  <g transform="translate(320,64)">
    <g class="orb-wrap orb-b"><circle class="orb" cx="0" cy="0" r="4"/></g>
  </g>
  <g transform="translate(460,76)">
    <g class="orb-wrap orb-c"><circle class="orb" cx="0" cy="0" r="4"/></g>
  </g>
  <!-- fae sprite: SMIL translate so motion still works when SVG is shown as an image -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="-48,0;472,0;-48,0" keyTimes="0;0.5;1" dur="12s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <g transform="translate(20,50) scale(3)" filter="url(#glow)">
      <!-- wings (behind) -->
      <rect x="1" y="6" width="3" height="5" fill="#7c3aed" opacity="0.85"/>
      <rect x="12" y="6" width="3" height="5" fill="#7c3aed" opacity="0.85"/>
      <rect x="0" y="7" width="2" height="3" fill="#b57bff"/>
      <rect x="14" y="7" width="2" height="3" fill="#b57bff"/>
      <!-- dress / body -->
      <rect x="6" y="8" width="4" height="6" fill="#b57bff"/>
      <rect x="5" y="10" width="6" height="5" fill="#7c3aed"/>
      <rect x="6" y="14" width="4" height="3" fill="#5b21b6"/>
      <!-- head -->
      <rect x="6" y="4" width="4" height="4" fill="#f0abfc"/>
      <rect x="6" y="3" width="4" height="2" fill="#e879f9"/>
      <!-- hair -->
      <rect x="5" y="2" width="6" height="3" fill="#1e1b4b"/>
      <rect x="4" y="3" width="2" height="4" fill="#1e1b4b"/>
      <rect x="10" y="3" width="2" height="4" fill="#1e1b4b"/>
      <!-- eyes -->
      <rect x="7" y="6" width="1" height="1" fill="#0d0d2b"/>
      <rect x="9" y="6" width="1" height="1" fill="#0d0d2b"/>
      <!-- wand -->
      <rect x="14" y="10" width="1" height="6" fill="#fcd34d"/>
      <rect x="13" y="9" width="3" height="2" fill="#f0abfc"/>
      <rect x="14" y="8" width="1" height="2" fill="#e2d9f3"/>
    </g>
  </g>
  <!-- retro HUD -->
  <rect x="8" y="8" width="168" height="26" rx="4" fill="#0d0d2b" stroke="#7c3aed" stroke-opacity="0.6" stroke-width="1"/>
  <text x="16" y="26" font-family="ui-monospace, 'Cascadia Mono', 'Consolas', monospace" font-size="11" fill="#e2d9f3" letter-spacing="1">COMMITS: inf</text>
  <text x="380" y="26" font-family="ui-monospace, 'Cascadia Mono', 'Consolas', monospace" font-size="9" fill="#b57bff" opacity="0.9">CIRCUITFAE // QUEST</text>
</svg>
